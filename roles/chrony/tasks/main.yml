---
- name: Ensure chrony is installed
  ansible.builtin.package:
    name: chrony
    state: present
  become: yes
  tags: [chrony, install]
  register: chrony_install

- name: Copy chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ chrony_config_path }}"
    owner: root
    group: root
    mode: '0644'
   # validate: 'chronyd -f %s'
  become: yes
  notify: restart chrony
  tags: [chrony, config]

- name: Ensure chrony is running and enabled
  ansible.builtin.service:
    name: "{{ chrony_service_name }}"
    state: started
    enabled: yes
  become: yes
  tags: [chrony, service]
